<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>《妖狐？史萊姆？》小說貨幣換算器</title>
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 定義各式呼吸發光動畫 */
        @keyframes glowCopper { 0%, 100% { box-shadow: 0 0 5px rgba(205,127,50,0.2); } 50% { box-shadow: 0 0 12px rgba(205,127,50,0.5); } }
        @keyframes glowSilver { 0%, 100% { box-shadow: 0 0 5px rgba(204,204,204,0.2); } 50% { box-shadow: 0 0 12px rgba(204,204,204,0.5); } }
        @keyframes glowGoldSmall { 0%, 100% { box-shadow: 0 0 5px rgba(240,230,140,0.2); } 50% { box-shadow: 0 0 12px rgba(240,230,140,0.5); } }
        @keyframes glowGoldLarge { 0%, 100% { box-shadow: 0 0 5px rgba(255,215,0,0.2); } 50% { box-shadow: 0 0 15px rgba(255,215,0,0.6); } }
        @keyframes glowMeteor { 0%, 100% { box-shadow: 0 0 5px rgba(0,255,255,0.2); } 50% { box-shadow: 0 0 18px rgba(0,255,255,0.7); } }

        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            padding: 30px 20px; 
            background: #1a1a24; 
            color: #e0e0e6; 
        }
        .container { 
            max-width: 550px; 
            margin: 0 auto; 
            background: #252532; 
            padding: 0 0 30px 0; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            border: 1px solid #3d3d52;
            animation: fadeInUp 0.8s ease-out;
            overflow: hidden; 
        }
        
        /* 🦊 霸氣大橫幅專屬樣式區塊 */
        .banner-box a { 
            display: block; 
            width: 100%; 
            height: 280px; 
            background-image: url('https://raw.githubusercontent.com/sakefox/fox-and-slime/main/437272578_1092529625177433_9143506940498080878_n.png'); 
            background-size: cover; 
            background-position: center 22%; 
            background-repeat: no-repeat;
            position: relative;
            text-decoration: none;
            transition: all 0.3s ease;
            border-bottom: 2px solid #ffd700; 
        }
        
        .banner-box a:hover { 
            filter: brightness(1.1); 
        }

        .banner-tag {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.75);
            color: #ffd700;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.75em;
            letter-spacing: 1px;
            border: 1px solid rgba(255,215,0,0.3);
            transition: all 0.3s;
        }
        .banner-box a:hover .banner-tag {
            background: #ffd700;
            color: #15151f;
        }

        .main-content {
            padding: 25px 30px 0 30px;
        }

        h2 { text-align: center; color: #ffd700; margin-top: 0; font-size: 24px; letter-spacing: 2px; line-height: 1.4; margin-bottom: 5px; }
        .subtitle { text-align: center; font-size: 0.9em; color: #a0a0b0; margin-bottom: 20px; }
        
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid #3d3d52;
            padding-bottom: 12px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            background: #15151f;
            border: 1px solid #44445c;
            color: #a0a0b0;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95em;
            transition: all 0.2s ease;
        }
        .tab-btn:hover {
            border-color: #ffd700;
            color: #fff;
        }
        .tab-btn.active {
            background: #ffd700;
            color: #15151f;
            border-color: #ffd700;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .explain-text { text-align: center; font-size: 0.85em; color: #ff7675; margin-bottom: 20px; font-weight: bold; background: rgba(21,21,31,0.5); padding: 8px; border-radius: 6px; }

        .input-group { 
            margin-bottom: 18px; 
            position: relative;
        }
        label { 
            display: block; 
            margin-bottom: 6px; 
            font-weight: bold; 
        }
        .label-desc {
            font-size: 0.85em;
            color: #888899;
            font-weight: normal;
            margin-left: 5px;
        }
        input { 
            width: 100%; 
            padding: 10px 12px; 
            box-sizing: border-box; 
            border: 1px solid #44445c; 
            border-radius: 6px; 
            background: #15151f;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        .input-real { border-color: #44445c; }
        .input-real:focus { border-color: #ff7675; box-shadow: 0 0 12px rgba(255,118,117,0.8); outline: none; }

        .glow-copper { border-color: rgba(205,127,50,0.3); animation: glowCopper 3s infinite ease-in-out; }
        .glow-copper:focus { border-color: #cd7f32; box-shadow: 0 0 12px rgba(205,127,50,0.8); animation: none; outline: none; }

        .glow-silver { border-color: rgba(204,204,204,0.3); animation: glowSilver 3s infinite ease-in-out; }
        .glow-silver:focus { border-color: #cccccc; box-shadow: 0 0 12px rgba(204,204,204,0.8); animation: none; outline: none; }

        .glow-g-small { border-color: rgba(240,230,140,0.3); animation: glowGoldSmall 3s infinite ease-in-out; }
        .glow-g-small:focus { border-color: #f0e68c; box-shadow: 0 0 12px rgba(240,230,140,0.8); animation: none; outline: none; }

        .glow-g-large { border-color: rgba(255,215,0,0.3); animation: glowGoldLarge 3s infinite ease-in-out; }
        .glow-g-large:focus { border-color: #ffd700; box-shadow: 0 0 12px rgba(255,215,0,0.8); animation: none; outline: none; }

        .glow-g-meteor { border-color: rgba(0,255,255,0.3); animation: glowMeteor 3s infinite ease-in-out; }
        .glow-g-meteor:focus { border-color: #00ffff; box-shadow: 0 0 12px rgba(0,255,255,0.8); animation: none; outline: none; }

        .note { 
            font-size: 0.85em; 
            color: #888899; 
            text-align: center; 
            margin-top: 20px; 
            border-top: 1px dashed #44445c;
            padding-top: 15px;
        }
        
        .color-base { color: #ff7675; }
        .color-copper { color: #cd7f32; }
        .color-silver { color: #cccccc; }
        .color-g-small { color: #f0e68c; }
        .color-g-large { color: #ffd700; }
        .color-g-meteor { color: #00ffff; text-shadow: 0 0 3px rgba(0,255,255,0.5); }

        /* 👇 核心修正二：響應式媒體查詢（當螢幕小於 600px 的手機版設定） */
        @media (max-width: 600px) {
            body {
                padding: 10px; /* 縮小手機版的外框留白 */
            }
            .container {
                border-radius: 8px; /* 稍微減小圓角，更契合手機邊框 */
            }
            .banner-box a {
                height: 180px; /* 降低手機版的橫幅高度，避免畫面被大圖霸佔 */
                background-position: center 20%; /* 重新微調手機版狐耳娘的完美五官中心 */
            }
            .main-content {
                padding: 15px 15px 0 15px; /* 縮小內部欄位間距，讓輸入格更寬、更好點擊 */
            }
            h2 {
                font-size: 20px; /* 稍微縮小手機版標題字體，防止折行太難看 */
            }
            .tab-btn {
                padding: 12px 6px; /* 加高按鈕，讓使用者的手指更好點擊切換 */
                font-size: 0.85em;
            }
            .label-desc {
                display: block; /* 在手機上讓進位註記小字自動換行，避免擠在一起 */
                margin-left: 0;
                margin-top: 2px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="banner-box">
        <a href="https://www.kadokado.com.tw/book/9175" target="_blank" title="前往觀看《妖狐？史萊姆？》">
            <div class="banner-tag">📖 前往《妖狐？史萊姆？》線上看</div>
        </a>
    </div>

    <div class="main-content">
        <h2>《妖狐？史萊姆？》<br>——世界觀幣值換算器——</h2>
        <div class="subtitle">創作者與讀者專專屬的幣值計算工具</div>

        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('shopping')">👛 冒險者背包 (錢包整理)</button>
            <button class="tab-btn" onclick="switchTab('exchange')">🪙 幣值等值換算</button>
        </div>

        <div id="tab_shopping" class="tab-content active">
            <div class="explain-text">💡 模式：輸入預算總額，自動分配冒險者需要掏出哪些面額的硬幣！<br>(例: 輸入150銅 ➔ 自動整理成 1銀 50銅)</div>
            
            <div class="input-group">
                <label class="color-base">💰 輸入物品總價值 <span class="label-desc">(1銅幣 = 10元基準)</span></label>
                <input type="number" id="s_real" placeholder="請輸入金額..." oninput="calcShopping('s_real')" class="input-real">
            </div>
            <hr style="border: 0; border-top: 1px solid #44445c; margin: 20px 0;">
            <div class="input-group">
                <label class="color-g-meteor">☄️ 需準備：隕金幣 <span class="label-desc">(價值：一億 / = 100 大金幣)</span></label>
                <input type="number" id="s_meteor" placeholder="0" oninput="calcShopping('s_meteor')" class="glow-g-meteor">
            </div>
            <div class="input-group">
                <label class="color-g-large">👑 需準備：大金幣 <span class="label-desc">(價值：百萬 / = 100 小金幣)</span></label>
                <input type="number" id="s_gold_large" placeholder="0" oninput="calcShopping('s_gold_large')" class="glow-g-large">
            </div>
            <div class="input-group">
                <label class="color-g-small">🪙 需準備：小金幣 <span class="label-desc">(價值：一萬 / = 10 銀幣)</span></label>
                <input type="number" id="s_gold_small" placeholder="0" oninput="calcShoppingDirect('s_gold_small')" class="glow-g-small">
            </div>
            <div class="input-group">
                <label class="color-silver">🥈 需準備：銀幣 <span class="label-desc">(價值：一千 / = 100 銅幣)</span></label>
                <input type="number" id="s_silver" placeholder="0" oninput="calcShoppingDirect('s_silver')" class="glow-silver">
            </div>
            <div class="input-group">
                <label class="color-copper">🥉 需準備：銅幣 <span class="label-desc">(價值：十 / 最基礎面額)</span></label>
                <input type="number" id="s_copper" placeholder="0" oninput="calcShoppingDirect('s_copper')" class="glow-copper">
            </div>
        </div>

        <div id="tab_exchange" class="tab-content">
            <div class="explain-text">💡 模式：純幣值換算。各格數字「完全等值」！<br>(例: 輸入1銀 ➔ 全自動同步等於 100銅 / 0.1小金)</div>
            
            <div class="input-group">
                <label class="color-base">💰 等值價值 <span class="label-desc">(1銅幣 = 10元基準)</span></label>
                <input type="number" id="e_real" placeholder="0" oninput="calcExchange('e_real')" class="input-real">
            </div>
            <div class="input-group">
                <label class="color-copper">🥉 等值銅幣 <span class="label-desc">(價值：十 / 最基礎面額)</span></label>
                <input type="number" id="e_copper" placeholder="0" oninput="calcExchange('e_copper')" class="glow-copper">
            </div>
            <div class="input-group">
                <label class="color-silver">🥈 等值銀幣 <span class="label-desc">(價值：一千 / = 100 銅幣)</span></label>
                <input type="number" id="e_silver" placeholder="0" oninput="calcExchange('e_silver')" class="glow-silver">
            </div>
            <div class="input-group">
                <label class="color-g-small">🪙 等值小金幣 <span class="label-desc">(價值：一萬 / = 10 銀幣)</span></label>
                <input type="number" id="e_gold_small" placeholder="0" oninput="calcExchange('e_gold_small')" class="glow-g-small">
            </div>
            <div class="input-group">
                <label class="color-g-large">👑 等值大金幣 <span class="label-desc">(價值：百萬 / = 100 小金幣)</span></label>
                <input type="number" id="e_gold_large" placeholder="0" oninput="calcExchange('e_gold_large')" class="glow-g-large">
            </div>
            <div class="input-group">
                <label class="color-g-meteor">☄️ 等值隕金幣 <span class="label-desc">(價值：一億 / = 100 大金幣)</span></label>
                <input type="number" id="e_meteor" placeholder="0" oninput="calcExchange('e_meteor')" class="glow-g-meteor">
            </div>
        </div>
        
        <div class="note">💡 幣值進位：100銅 = 1銀 | 10銀 = 1小金 | 100小金 = 1大金 | 100大金 = 1隕金</div>
    </div>
</div>

<script>
    const VAL_COPPER = 1; const VAL_SILVER = 100; const VAL_GOLD_SMALL = 1000; const VAL_GOLD_LARGE = 100000; const VAL_METEOR = 10000000;

    function switchTab(tabName) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        if(tabName === 'shopping') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.getElementById('tab_shopping').classList.add('active');
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('tab_exchange').classList.add('active');
        }
    }

    function formatNum(num) { return parseFloat(num.toFixed(4)); }

    function calcShopping(source) {
        const elReal = document.getElementById('s_real'); const elMeteor = document.getElementById('s_meteor');
        const elGoldLarge = document.getElementById('s_gold_large'); const elGoldSmall = document.getElementById('s_gold_small');
        const elSilver = document.getElementById('s_silver'); const elCopper = document.getElementById('s_copper');
        let val = parseFloat(document.getElementById(source).value);
        if (isNaN(val)) { elReal.value=''; elMeteor.value=''; elGoldLarge.value=''; elGoldSmall.value=''; elSilver.value=''; elCopper.value=''; return; }

        let totalCopper = 0;
        if (source === 's_real') totalCopper = val / 10;
        else if (source === 's_meteor') totalCopper = val * VAL_METEOR;
        else if (source === 's_gold_large') totalCopper = val * VAL_GOLD_LARGE;

        let remaining = totalCopper;
        let mNum = Math.floor(remaining / VAL_METEOR); remaining %= VAL_METEOR;
        let glNum = Math.floor(remaining / VAL_GOLD_LARGE); remaining %= VAL_GOLD_LARGE;
        let gsNum = Math.floor(remaining / VAL_GOLD_SMALL); remaining %= VAL_GOLD_SMALL;
        let sNum = Math.floor(remaining / VAL_SILVER); remaining %= VAL_SILVER;
        let cNum = remaining;

        if (source !== 's_real') elReal.value = formatNum(totalCopper * 10);
        if (source !== 's_meteor') elMeteor.value = mNum;
        if (source !== 's_gold_large') elGoldLarge.value = glNum;
        elGoldSmall.value = gsNum; elSilver.value = sNum; elCopper.value = formatNum(cNum);
    }

    function calcShoppingDirect(source) {
        let val = parseFloat(document.getElementById(source).value);
        if (isNaN(val)) { calcShopping('s_real'); return; }
        let totalCopper = 0;
        if (source === 's_gold_small') totalCopper = val * VAL_GOLD_SMALL;
        if (source === 's_silver') totalCopper = val * VAL_SILVER;
        if (source === 's_copper') totalCopper = val;

        document.getElementById('s_real').value = formatNum(totalCopper * 10);
        document.getElementById('s_meteor').value = formatNum(totalCopper / VAL_METEOR);
        document.getElementById('s_gold_large').value = formatNum(totalCopper / VAL_GOLD_LARGE);
        if (source !== 's_gold_small') document.getElementById('s_gold_small').value = formatNum(totalCopper / VAL_GOLD_SMALL);
        if (source !== 's_silver') document.getElementById('s_silver').value = formatNum(totalCopper / VAL_SILVER);
        if (source !== 's_copper') document.getElementById('s_copper').value = formatNum(totalCopper);
    }

    function calcExchange(source) {
        let val = parseFloat(document.getElementById(source).value);
        const eReal = document.getElementById('e_real'); const eCopper = document.getElementById('e_copper');
        const eSilver = document.getElementById('e_silver'); const eGoldSmall = document.getElementById('e_gold_small');
        const eGoldLarge = document.getElementById('e_gold_large'); const eMeteor = document.getElementById('e_meteor');
        if (isNaN(val)) { eReal.value=''; eCopper.value=''; eSilver.value=''; eGoldSmall.value=''; eGoldLarge.value=''; eMeteor.value=''; return; }

        let totalCopper = 0;
        if (source === 'e_real') totalCopper = val / 10;
        if (source === 'e_copper') totalCopper = val;
        if (source === 'e_silver') totalCopper = val * VAL_SILVER;
        if (source === 'e_gold_small') totalCopper = val * VAL_GOLD_SMALL;
        if (source === 'e_gold_large') totalCopper = val * VAL_GOLD_LARGE;
        if (source === 'e_meteor') totalCopper = val * VAL_METEOR;

        if (source !== 'e_real') eReal.value = formatNum(totalCopper * 10);
        if (source !== 'e_copper') eCopper.value = formatNum(totalCopper);
        if (source !== 'e_silver') eSilver.value = formatNum(totalCopper / VAL_SILVER);
        if (source !== 'e_gold_small') eGoldSmall.value = formatNum(totalCopper / VAL_GOLD_SMALL);
        if (source !== 'e_gold_large') eGoldLarge.value = formatNum(totalCopper / VAL_GOLD_LARGE);
        if (source !== 'e_meteor') eMeteor.value = formatNum(totalCopper / VAL_METEOR);
    }
</script>
</body>
</html>
